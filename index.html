<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玄門命理 - 五行全方位分析</title>
    <!-- 載入書法字體與楷體 -->
    <link href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary-red: #8B0000;
            --gold: #D4AF37;
            --paper: #f4e4bc;
        }

        body {
            background-color: #1a1a1a;
            font-family: 'Noto Serif TC', serif;
            color: #333;
        }

        .fortune-container {
            background: var(--paper);
            background-image: radial-gradient(#ead2a4 1px, transparent 1px);
            background-size: 20px 20px;
            border: 8px double var(--primary-red);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .calligraphy {
            font-family: 'Zhi Mang Xing', cursive;
        }

        .btn-divine {
            background: linear-gradient(135deg, var(--primary-red), #5a0000);
            color: var(--gold);
            transition: all 0.3s ease;
            border: 2px solid var(--gold);
            cursor: pointer;
        }

        .btn-divine:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px var(--gold);
        }

        /* 八卦旋轉動畫 */
        @keyframes rotate-bagua {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .bagua-loader {
            animation: rotate-bagua 4s linear infinite;
        }

        .result-section {
            display: none;
            border-top: 2px dashed var(--primary-red);
        }

        .element-bar-bg {
            background: rgba(0,0,0,0.1);
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
        }

        .element-bar {
            height: 100%;
            transition: width 1.5s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        /* 五行顏色 */
        .wood { background: linear-gradient(90deg, #1b5e20, #4caf50); }
        .fire { background: linear-gradient(90deg, #b71c1c, #f44336); }
        .earth { background: linear-gradient(90deg, #5d4037, #8d6e63); }
        .metal { background: linear-gradient(90deg, #fbc02d, #fff176); }
        .water { background: linear-gradient(90deg, #0d47a1, #2196f3); }

        select, input {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid var(--primary-red);
            padding: 10px;
            border-radius: 4px;
            width: 100%;
        }

        .fortune-card {
            background: rgba(255, 255, 255, 0.4);
            border-left: 4px solid var(--primary-red);
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .love-heart {
            color: #ff4d4d;
            display: inline-block;
            margin: 0 2px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="fortune-container max-w-2xl w-full p-6 md:p-10 rounded-lg relative overflow-hidden my-8">
        <!-- 裝飾邊框 -->
        <div class="absolute top-0 left-0 w-16 h-16 border-t-4 border-l-4 border-red-900 m-2"></div>
        <div class="absolute top-0 right-0 w-16 h-16 border-t-4 border-r-4 border-red-900 m-2"></div>
        <div class="absolute bottom-0 left-0 w-16 h-16 border-b-4 border-l-4 border-red-900 m-2"></div>
        <div class="absolute bottom-0 right-0 w-16 h-16 border-b-4 border-r-4 border-red-900 m-2"></div>

        <header class="text-center mb-10">
            <h1 class="calligraphy text-6xl md:text-7xl text-red-900 mb-2">玄門命理</h1>
            <p class="text-sm tracking-widest text-red-800 font-bold">—— 乾坤造化 · 姻緣五行分析 ——</p>
        </header>

        <div id="inputForm" class="space-y-6">
            <div class="flex flex-col">
                <label class="text-lg font-bold mb-2 text-red-900">閣下姓名</label>
                <input type="text" id="userName" placeholder="請輸入姓名" class="text-center text-xl font-bold">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="flex flex-col">
                    <label class="font-bold mb-2 text-red-900 text-sm">性別 (陰陽)</label>
                    <select id="userGender">
                        <option value="male">乾 (男)</option>
                        <option value="female">坤 (女)</option>
                    </select>
                </div>
                <div class="flex flex-col">
                    <label class="font-bold mb-2 text-red-900 text-sm">出生年份</label>
                    <select id="birthYear"></select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="flex flex-col">
                    <label class="font-bold mb-2 text-red-900 text-sm">出生月份</label>
                    <select id="birthMonth"></select>
                </div>
                <div class="flex flex-col">
                    <label class="font-bold mb-2 text-red-900 text-sm">出生日期</label>
                    <select id="birthDay"></select>
                </div>
            </div>

            <button onclick="calculateFortune()" class="btn-divine w-full py-4 rounded-full text-3xl calligraphy mt-6">
                窺探天機
            </button>
        </div>

        <!-- 載入動畫 -->
        <div id="loader" class="text-center py-20 hidden">
            <div class="bagua-loader inline-block mb-6 text-6xl text-red-900">☯</div>
            <p class="text-red-900 animate-pulse calligraphy text-3xl">正在翻閱月老紅線，推算情緣...</p>
        </div>

        <!-- 結果呈現 -->
        <section id="result" class="result-section mt-8 pt-8">
            <div class="text-center mb-8">
                <h2 class="calligraphy text-5xl text-red-900 mb-2" id="resTitle">批命結果</h2>
                <div id="zodiacInfo" class="text-red-800 font-bold border-b border-red-900 inline-block pb-1"></div>
            </div>
            
            <!-- 能量分佈 -->
            <div class="fortune-card">
                <h3 class="font-bold text-red-900 mb-4 flex items-center">
                    <span class="mr-2">◈</span> 五行能量分佈
                </h3>
                <div id="elementList" class="space-y-4"></div>
            </div>

            <!-- 愛情桃花深度分析 -->
            <div class="fortune-card" style="border-left-color: #ff4d4d;">
                <h3 class="font-bold text-red-600 mb-2 flex items-center">
                    <span class="mr-2">❤</span> 姻緣桃花批註
                    <span id="loveIndex" class="ml-auto text-sm"></span>
                </h3>
                <p id="loveDesc" class="leading-relaxed text-gray-800 italic"></p>
            </div>

            <!-- 性格深度分析 -->
            <div class="fortune-card">
                <h3 class="font-bold text-red-900 mb-2 flex items-center">
                    <span class="mr-2">◈</span> 性格深度批註
                </h3>
                <p id="personalityDesc" class="leading-relaxed text-gray-800"></p>
            </div>

            <!-- 開運指引 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div class="fortune-card">
                    <h3 class="font-bold text-red-900 mb-2">✦ 趨吉避凶</h3>
                    <ul id="guideList" class="text-sm space-y-1 text-gray-700"></ul>
                </div>
                <div class="fortune-card" style="border-left-color: #ff9900;">
                    <h3 class="font-bold text-orange-700 mb-2">✦ 姻緣對象建議</h3>
                    <p id="matchGuide" class="text-sm text-gray-700"></p>
                </div>
            </div>

            <button onclick="resetForm()" class="w-full py-2 text-red-900 hover:underline text-sm font-bold">
                重新測算
            </button>
            
            <div class="mt-8 text-center text-xs text-red-800/60 italic">
                * 命由天定，運由己造。愛重在經營，此結果僅供參考。 *
            </div>
        </section>
    </div>

    <script>
        // 初始化下拉選單
        const yearSelect = document.getElementById('birthYear');
        const monthSelect = document.getElementById('birthMonth');
        const daySelect = document.getElementById('birthDay');

        const currentYear = new Date().getFullYear();
        for (let i = currentYear; i >= 1920; i--) yearSelect.add(new Option(i + ' 年', i));
        for (let i = 1; i <= 12; i++) monthSelect.add(new Option(i + ' 月', i));
        for (let i = 1; i <= 31; i++) daySelect.add(new Option(i + ' 日', i));

        const zodiacs = ["鼠", "牛", "虎", "兔", "龍", "蛇", "馬", "羊", "猴", "雞", "狗", "豬"];
        const heavenlyStems = ["甲", "乙", "丙", "丁", "戊", "己", "庚", "辛", "壬", "癸"];
        const earthlyBranches = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];

        function getZodiac(year) {
            return zodiacs[(year - 4) % 12];
        }

        function getGanZhi(year) {
            let stem = heavenlyStems[(year - 4) % 10];
            let branch = earthlyBranches[(year - 4) % 12];
            return stem + branch;
        }

        async function calculateFortune() {
            const name = document.getElementById('userName').value.trim();
            if (!name) {
                alert('請先輸入大名，方能測算天機。');
                return;
            }

            document.getElementById('inputForm').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            await new Promise(r => setTimeout(r, 2000));

            const year = parseInt(yearSelect.value);
            const month = parseInt(monthSelect.value);
            const gender = document.getElementById('userGender').value;

            let scores = { wood: 15, fire: 15, earth: 15, metal: 15, water: 15 };

            // 1. 生肖與年份影響
            const yearTail = year % 10;
            if ([4,5].includes(yearTail)) scores.wood += 10;
            if ([6,7].includes(yearTail)) scores.fire += 10;
            if ([8,9].includes(yearTail)) scores.earth += 10;
            if ([0,1].includes(yearTail)) scores.metal += 10;
            if ([2,3].includes(yearTail)) scores.water += 10;

            // 2. 季節能量
            if ([2,3,4].includes(month)) scores.wood += 20; 
            else if ([5,6,7].includes(month)) scores.fire += 20; 
            else if ([8,9,10].includes(month)) scores.metal += 20; 
            else scores.water += 20; 
            scores.earth += 10; 

            // 3. 姓名權重
            let nameVal = 0;
            for(let i=0; i<name.length; i++) nameVal += name.charCodeAt(i);
            const nameElements = ['water', 'wood', 'fire', 'earth', 'metal'];
            scores[nameElements[nameVal % 5]] += 25;

            // 總分歸一化
            const total = Object.values(scores).reduce((a,b) => a+b, 0);
            for(let key in scores) scores[key] = Math.round((scores[key]/total) * 100);

            renderResults(name, year, scores, gender, nameVal);
        }

        function renderResults(name, year, scores, gender, nameVal) {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('result').style.display = 'block';

            const title = gender === 'male' ? '齋主' : '女信士';
            document.getElementById('resTitle').innerText = `${name} ${title}`;
            document.getElementById('zodiacInfo').innerText = `${getGanZhi(year)}年屬${getZodiac(year)} · 姻緣命盤分析`;

            // 1. 能量條
            const list = document.getElementById('elementList');
            list.innerHTML = '';
            const elNames = { wood: '木', fire: '火', earth: '土', metal: '金', water: '水' };
            
            let maxEl = 'wood';
            for (let key in scores) {
                if (scores[key] > scores[maxEl]) maxEl = key;
                list.innerHTML += `
                    <div>
                        <div class="flex justify-between text-xs mb-1 font-bold">
                            <span>${elNames[key]}</span>
                            <span>${scores[key]}%</span>
                        </div>
                        <div class="element-bar-bg">
                            <div class="${key} element-bar" style="style: width: ${scores[key]}%"></div>
                        </div>
                    </div>
                `;
            }

            // 2. 桃花指數 (隨機加姓名加權)
            const loveStars = (nameVal % 3) + 3; // 3 to 5 stars
            let heartHtml = '';
            for(let i=0; i<5; i++) heartHtml += i < loveStars ? '<span class="love-heart">❤</span>' : '<span class="text-gray-300">❤</span>';
            document.getElementById('loveIndex').innerHTML = `桃花指數：${heartHtml}`;

            // 3. 愛情分析
            const loveAnalysis = {
                wood: "您在感情中像一棵守護的大樹，穩定且溫暖，但有時過於木訥，不懂浪漫。您的情緣多在春季萌芽，建議多展現柔情的一面，別讓固執傷了紅線。",
                fire: "您的愛情烈火如荼，來得快也去得快。您追求靈魂的契合，容易一見鍾情。但要注意火大易燥，與伴侶發生爭執時應先退一步，以免燒斷緣份。",
                earth: "您對感情極度忠誠，追求長久穩定的關係。您不擅長甜言蜜語，但行為絕對可靠。情緣多由親友介紹，雖然平淡但往往能攜手白頭。",
                metal: "您在愛情中冷靜果斷，不愛則已，一愛驚人。您注重原則，甚至帶點霸道，這讓伴侶既崇拜又壓力大。建議收斂鋒芒，用溫柔化解冰霜。",
                water: "您情思細膩，如水般溫柔多情，容易陷入浪漫的幻想。您的桃花極旺，但常因猶豫不決而錯失良緣。學會勇敢表達，才能留住真正懂您的人。"
            };
            document.getElementById('loveDesc').innerText = loveAnalysis[maxEl];

            // 4. 性格深度分析
            const personality = {
                wood: "【木盛者】心地慈悲，具向上發展之志。正直而不彎腰，具備強大的生命力與韌性。",
                fire: "【火旺者】熱情奔放，具備極強的領導力。待人赤誠，做事風風火火。",
                earth: "【土厚者】沉穩踏實，厚德載物。守信用、重承諾，是可靠的夥伴。",
                metal: "【金銳者】剛毅果決，執行力驚人。重義氣，處事乾淨利落。",
                water: "【水靈者】足智多謀，適應力強。洞察力敏銳，善於謀劃與變通。"
            };
            document.getElementById('personalityDesc').innerText = personality[maxEl];

            // 5. 趨吉避凶
            const guide = {
                wood: { color: "青綠", pos: "東", item: "木質飾品" },
                fire: { color: "紅紫", pos: "南", item: "紅色配件" },
                earth: { color: "黃褐", pos: "西南", item: "玉石珠寶" },
                metal: { color: "金白", pos: "西", item: "金屬配飾" },
                water: { color: "藍黑", pos: "北", item: "水晶飾品" }
            };
            const g = guide[maxEl];
            document.getElementById('guideList').innerHTML = `
                <li>● 幸運色：${g.color}</li>
                <li>● 桃花位：${g.pos}</li>
                <li>● 招財小物：${g.item}</li>
            `;

            // 6. 姻緣對象建議 (相生原理)
            const matching = {
                wood: "【水、火】屬性者。水能生木，火能洩木之秀。尋找溫柔靈活或熱情開朗的伴侶最佳。",
                fire: "【木、土】屬性者。木能生火，土能收斂火氣。尋找穩重踏實或才華洋溢的對象最佳。",
                earth: "【火、金】屬性者。火能生土，土能生金。尋找積極熱情或剛毅果斷的伴侶最為互補。",
                metal: "【土、水】屬性者。土能生金，金能生水。尋找沉穩包容或智慧靈活的伴侶能長久和諧。",
                water: "【金、木】屬性者。金能生水，水能生木。尋找原則性強或富有慈悲心的對象最為契合。"
            };
            document.getElementById('matchGuide').innerText = matching[maxEl];
        }

        function resetForm() {
            document.getElementById('inputForm').style.display = 'block';
            document.getElementById('result').style.display = 'none';
        }
    </script>
</body>
</html>
